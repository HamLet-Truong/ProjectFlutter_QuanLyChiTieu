name: expense_manager
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  http: ^1.2.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  equatable: ^2.0.5
  uuid: ^4.4.0
  path: ^1.9.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/images/
    - assets/icons/
    - assets/illustrations/
